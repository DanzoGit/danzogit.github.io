<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Технический анализ 7 Days to Die 2.6 (b14)</title>

<!-- Markdown parser -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<!-- Syntax highlighting -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/csharp.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/xml.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/bash.min.js"></script>

<style>
  :root{
    --bg:           #0f1419;
    --bg-elev:      #161b22;
    --bg-code:      #1a1f27;
    --border:       #2a313c;
    --text:         #e6edf3;
    --text-dim:     #9aa4b2;
    --accent:       #7ee787;   /* мягкий зелёный */
    --accent-2:     #79c0ff;   /* мягкий голубой */
    --warn:         #ffa657;
    --quote:        #d2a8ff;
    --table-stripe: #131820;
    --shadow:       0 8px 24px rgba(0,0,0,.35);
    --radius:       10px;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background: radial-gradient(1200px 600px at 20% -10%, #1a2230 0%, transparent 60%),
                radial-gradient(800px 500px at 110% 10%, #14202a 0%, transparent 55%),
                var(--bg);
    color: var(--text);
    font-family: "Inter", "Segoe UI", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    font-size: 16px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .layout{
    display: grid;
    grid-template-columns: 280px minmax(0, 1fr);
    gap: 32px;
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  /* Sidebar TOC */
  aside.toc{
    position: sticky; top: 24px; align-self: start;
    max-height: calc(100vh - 48px);
    overflow: auto;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 18px 22px;
    box-shadow: var(--shadow);
  }
  aside.toc h2{
    font-size: 13px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--text-dim); margin: 0 0 12px;
  }
  aside.toc ul{ list-style:none; padding:0; margin:0 }
  aside.toc li{ margin: 4px 0 }
  aside.toc a{
    display:block; padding: 6px 10px;
    color: var(--text-dim); text-decoration: none;
    border-left: 2px solid transparent; border-radius: 4px;
    font-size: 14px; transition: all .15s ease;
  }
  aside.toc a:hover{ color: var(--text); background: rgba(255,255,255,.03) }
  aside.toc a.lvl-3{ padding-left: 22px; font-size: 13px }
  aside.toc a.active{
    color: var(--accent); border-left-color: var(--accent);
    background: rgba(126,231,135,.06);
  }

  /* Article */
  main{
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 40px 56px;
    box-shadow: var(--shadow);
    min-width: 0;
  }

  h1, h2, h3, h4{ color: var(--text); line-height: 1.3; letter-spacing: -.01em }
  h1{ font-size: 28px; margin: 0 0 18px; border-bottom: 1px solid var(--border); padding-bottom: 14px }
  h2{ font-size: 22px; margin: 36px 0 12px; color: var(--accent) }
  h3{ font-size: 18px; margin: 26px 0 10px; color: var(--accent-2) }
  h4{ font-size: 16px; margin: 20px 0 8px; color: var(--warn) }

  p{ margin: 10px 0 14px }
  a{ color: var(--accent-2); text-decoration: none; border-bottom: 1px dashed rgba(121,192,255,.4) }
  a:hover{ border-bottom-style: solid }

  strong{ color: #fff }
  em{ color: var(--quote) }

  /* Inline code */
  code{
    font-family: "JetBrains Mono", "Fira Code", "SF Mono", Menlo, Consolas, monospace;
    font-size: .9em;
    background: var(--bg-code);
    color: var(--accent);
    padding: 2px 6px;
    border-radius: 5px;
    border: 1px solid var(--border);
  }

  /* Code blocks */
  pre{
    position: relative;
    background: var(--bg-code);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    overflow-x: auto;
    margin: 18px 0;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.02);
  }
  pre code{
    background: transparent;
    border: 0;
    padding: 0;
    color: var(--text);
    font-size: 13.5px;
    line-height: 1.55;
  }
  pre::before{
    content: attr(data-lang);
    position: absolute; top: 8px; right: 56px;
    font-size: 11px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: .08em;
  }
  .copy-btn{
    position: absolute; top: 8px; right: 10px;
    background: rgba(255,255,255,.04);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 11px;
    padding: 4px 8px;
    cursor: pointer;
    transition: all .15s ease;
    font-family: inherit;
  }
  .copy-btn:hover{ color: var(--text); background: rgba(255,255,255,.08) }
  .copy-btn.copied{ color: var(--accent); border-color: var(--accent) }

  /* Blockquote */
  blockquote{
    margin: 16px 0;
    padding: 8px 16px;
    border-left: 3px solid var(--quote);
    background: rgba(210,168,255,.06);
    color: var(--text-dim);
    border-radius: 0 6px 6px 0;
  }
  blockquote p{ margin: 6px 0 }

  /* Lists */
  ul, ol{ padding-left: 24px }
  li{ margin: 4px 0 }
  li::marker{ color: var(--accent-2) }

  /* HR */
  hr{ border: 0; height: 1px; background: var(--border); margin: 32px 0 }

  /* Tables */
  table{
    width: 100%;
    border-collapse: collapse;
    margin: 18px 0;
    background: var(--bg-code);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    font-size: 14px;
  }
  th, td{
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  th{
    background: #1f2630;
    color: var(--accent);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 12px;
    letter-spacing: .06em;
  }
  tr:nth-child(even) td{ background: var(--table-stripe) }
  tr:last-child td{ border-bottom: 0 }

  /* Loading / error */
  #status{
    color: var(--text-dim);
    font-style: italic;
    text-align: center;
    padding: 60px 20px;
  }
  #status.error{ color: var(--warn); font-style: normal }

  /* Scrollbar */
  ::-webkit-scrollbar{ width: 10px; height: 10px }
  ::-webkit-scrollbar-track{ background: transparent }
  ::-webkit-scrollbar-thumb{ background: #2a313c; border-radius: 10px }
  ::-webkit-scrollbar-thumb:hover{ background: #3a4452 }

  /* Mobile */
  @media (max-width: 900px){
    .layout{ grid-template-columns: 1fr; padding: 16px }
    aside.toc{ position: static; max-height: none }
    main{ padding: 24px 20px 40px }
    h1{ font-size: 24px }
    h2{ font-size: 20px }
  }
</style>
</head>
<body>
  <div class="layout">
    <aside class="toc">
      <h2>Содержание</h2>
      <ul id="toc-list"><li><span style="color:var(--text-dim);font-size:13px">Загрузка…</span></li></ul>
    </aside>
    <main>
      <div id="status">Загрузка <code>analysis.md</code>…</div>
      <article id="article" style="display:none"></article>
    </main>
  </div>

<script>
  // ----- Настройки -----
  const MD_FILE = 'analysis.md'; // имя Markdown-файла рядом с index.html

  // ----- Marked: рендерер -----
  marked.setOptions({
    gfm: true,
    breaks: false,
    headerIds: true,
    mangle: false,
  });

  function slugify(s){
    return s.toLowerCase()
      .replace(/[^\p{L}\p{N}\s-]/gu,'')
      .trim()
      .replace(/\s+/g,'-');
  }

  async function load(){
    const status = document.getElementById('status');
    try{
      const res = await fetch(MD_FILE, { cache: 'no-cache' });
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const md = await res.text();
      render(md);
    }catch(err){
      status.classList.add('error');
      status.innerHTML = '⚠️ Не удалось загрузить <code>' + MD_FILE + '</code>: ' + err.message +
        '<br><br>Запустите страницу через локальный сервер (см. инструкцию).';
    }
  }

  function render(md){
    const article = document.getElementById('article');
    article.innerHTML = marked.parse(md);
    document.getElementById('status').style.display = 'none';
    article.style.display = 'block';

    // Подсветка кода + кнопки «копировать» + метка языка
    article.querySelectorAll('pre > code').forEach(code => {
      const pre = code.parentElement;
      // язык
      const langClass = [...code.classList].find(c => c.startsWith('language-'));
      const lang = langClass ? langClass.replace('language-','') : '';
      if(lang) pre.setAttribute('data-lang', lang);

      // подсветка
      try { hljs.highlightElement(code); } catch(e){}

      // кнопка копирования
      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Копировать';
      btn.addEventListener('click', () => {
        navigator.clipboard.writeText(code.innerText).then(() => {
          btn.textContent = 'Скопировано';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'Копировать'; btn.classList.remove('copied'); }, 1500);
        });
      });
      pre.appendChild(btn);
    });

    // Оглавление по H2 / H3
    const tocList = document.getElementById('toc-list');
    tocList.innerHTML = '';
    const headings = article.querySelectorAll('h2, h3');
    headings.forEach(h => {
      if(!h.id) h.id = slugify(h.textContent);
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = '#' + h.id;
      a.textContent = h.textContent;
      a.className = h.tagName === 'H3' ? 'lvl-3' : 'lvl-2';
      a.addEventListener('click', e => {
        e.preventDefault();
        document.getElementById(h.id).scrollIntoView({behavior:'smooth', block:'start'});
        history.replaceState(null, '', '#' + h.id);
      });
      li.appendChild(a);
      tocList.appendChild(li);
    });

    // Подсветка активного пункта оглавления при скролле
    const links = [...tocList.querySelectorAll('a')];
    const map = new Map(links.map(l => [l.getAttribute('href').slice(1), l]));
    const obs = new IntersectionObserver(entries => {
      entries.forEach(en => {
        if(en.isIntersecting){
          links.forEach(l => l.classList.remove('active'));
          const link = map.get(en.target.id);
          if(link) link.classList.add('active');
        }
      });
    }, { rootMargin: '-20% 0px -70% 0px' });
    headings.forEach(h => obs.observe(h));

    // Если в URL есть якорь — прокрутить
    if(location.hash){
      const el = document.getElementById(location.hash.slice(1));
      if(el) el.scrollIntoView();
    }
  }

  load();
</script>
</body>
</html>
